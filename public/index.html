<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>image-tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.5rem; color: #fff; letter-spacing: -0.02em; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 1rem; }
    label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
    .drop-zone { border: 2px dashed #333; border-radius: 8px; padding: 1.5rem; text-align: center; cursor: pointer; transition: border-color 0.2s; color: #555; font-size: 0.9rem; }
    .drop-zone.over, .drop-zone:hover { border-color: #555; color: #aaa; }
    .drop-zone.has-file { border-color: #4ade80; color: #4ade80; }
    .drop-zone.pdf { border-color: #60a5fa; }
    .drop-zone.pdf.has-file { border-color: #60a5fa; color: #60a5fa; }
    select, input[type=number], input[type=text] { background: #111; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; padding: 0.5rem 0.75rem; font-size: 0.9rem; width: 100%; }
    .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    /* Category tabs */
    .cat-tabs { display: flex; gap: 0.5rem; margin-bottom: 0.25rem; }
    .cat-tab { flex: 1; padding: 0.5rem; border: 1px solid #333; border-radius: 6px; background: #111; color: #888; cursor: pointer; font-size: 0.85rem; text-align: center; transition: all 0.15s; }
    .cat-tab.active { border-color: #4ade80; color: #4ade80; background: #0d1f14; }
    .cat-tab.pdf-cat.active { border-color: #60a5fa; color: #60a5fa; background: #0d1525; }
    /* Op tabs */
    .tabs { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .tab { padding: 0.4rem 0.75rem; border: 1px solid #333; border-radius: 6px; background: #111; color: #888; cursor: pointer; font-size: 0.8rem; text-align: center; transition: all 0.15s; white-space: nowrap; }
    .tab.active { border-color: #4ade80; color: #4ade80; background: #0d1f14; }
    .tab.pdf-tab.active { border-color: #60a5fa; color: #60a5fa; background: #0d1525; }
    button[type=submit] { background: #4ade80; color: #000; border: none; border-radius: 8px; padding: 0.75rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
    button[type=submit].pdf-btn { background: #60a5fa; }
    button[type=submit]:hover { opacity: 0.85; }
    button[type=submit]:disabled { opacity: 0.4; cursor: not-allowed; }
    #result { display: none; background: #111; border: 1px solid #2a2a2a; border-radius: 8px; padding: 1rem; font-size: 0.85rem; line-height: 1.6; }
    #result.error { border-color: #f87171; color: #f87171; }
    #result.success { border-color: #4ade80; }
    #result.success.pdf { border-color: #60a5fa; }
    #result a { color: #4ade80; text-decoration: none; font-weight: 600; }
    #result.pdf a { color: #60a5fa; }
    #result a:hover { text-decoration: underline; }
    .opts { display: flex; flex-direction: column; gap: 0.75rem; }
    .hidden { display: none !important; }
    pre { white-space: pre-wrap; word-break: break-all; font-size: 0.75rem; }
    .hint { font-size: 0.78rem; color: #555; }
  </style>
</head>
<body>
  <h1>🛠 image-tools</h1>
  <div class="card">

    <!-- Categoria -->
    <div class="field">
      <label>Categoria</label>
      <div class="cat-tabs">
        <div class="cat-tab active" data-cat="img">🖼 Imagem</div>
        <div class="cat-tab pdf-cat" data-cat="pdf">📄 PDF</div>
      </div>
    </div>

    <!-- Operações de imagem -->
    <div id="img-ops" class="field">
      <label>Operação</label>
      <div class="tabs">
        <div class="tab active" data-op="compress">Compress</div>
        <div class="tab" data-op="resize">Resize</div>
        <div class="tab" data-op="rotate">Rotate</div>
        <div class="tab" data-op="grayscale">Grayscale</div>
        <div class="tab" data-op="watermark">Watermark</div>
        <div class="tab" data-op="strip-metadata">Strip EXIF</div>
        <div class="tab" data-op="blur">Blur</div>
        <div class="tab" data-op="report">Report</div>
      </div>
    </div>

    <!-- Operações de PDF -->
    <div id="pdf-ops" class="field hidden">
      <label>Operação</label>
      <div class="tabs">
        <div class="tab pdf-tab active" data-op="pdf-merge">Merge</div>
        <div class="tab pdf-tab" data-op="pdf-split">Split</div>
        <div class="tab pdf-tab" data-op="pdf-extract">Extract</div>
        <div class="tab pdf-tab" data-op="img-to-pdf">Img → PDF</div>
        <div class="tab pdf-tab" data-op="pdf-to-img">PDF → Img</div>
      </div>
    </div>

    <!-- Drop zone -->
    <div class="field">
      <label id="dropLabel">Imagem</label>
      <div class="drop-zone" id="dropZone">
        Arraste ou clique para selecionar
        <input type="file" id="fileInput" accept="image/*" style="display:none" />
      </div>
    </div>

    <!-- ── Opções de imagem ── -->
    <div class="opts" id="opts-compress">
      <div class="row">
        <div class="field"><label>Formato</label>
          <select id="format"><option value="webp">WebP</option><option value="avif">AVIF</option></select>
        </div>
        <div class="field"><label>Qualidade</label><input type="number" id="quality" value="82" min="1" max="100" /></div>
        <div class="field"><label>Largura máx</label><input type="number" id="compressWidth" value="1920" min="1" /></div>
      </div>
    </div>

    <div class="opts hidden" id="opts-resize">
      <div class="row">
        <div class="field"><label>Largura (px)</label><input type="number" id="resizeWidth" placeholder="ex: 800" min="1" /></div>
        <div class="field"><label>Altura (px)</label><input type="number" id="resizeHeight" placeholder="ex: 600" min="1" /></div>
        <div class="field"><label>Fit</label>
          <select id="resizeFit">
            <option value="inside">inside</option>
            <option value="cover">cover (crop)</option>
            <option value="contain">contain</option>
            <option value="fill">fill</option>
          </select>
        </div>
      </div>
    </div>

    <div class="opts hidden" id="opts-rotate">
      <div class="row-2">
        <div class="field"><label>Ângulo</label>
          <select id="rotateAngle"><option value="90">90°</option><option value="180">180°</option><option value="270">270°</option></select>
        </div>
        <div class="field"><label>Auto (EXIF)</label>
          <select id="rotateAuto"><option value="false">Não</option><option value="true">Sim</option></select>
        </div>
      </div>
    </div>

    <div class="opts hidden" id="opts-watermark">
      <div class="row-2">
        <div class="field"><label>Texto</label><input type="text" id="wmText" value="© meu site" /></div>
        <div class="field"><label>Posição</label>
          <select id="wmPosition">
            <option value="bottom-right">Baixo direita</option>
            <option value="bottom-left">Baixo esquerda</option>
            <option value="top-right">Cima direita</option>
            <option value="top-left">Cima esquerda</option>
            <option value="center">Centro</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Opacidade (0–1)</label><input type="number" id="wmOpacity" value="0.5" min="0" max="1" step="0.1" /></div>
    </div>

    <!-- ── Opções de PDF ── -->
    <div class="opts hidden" id="opts-pdf-extract">
      <div class="field">
        <label>Páginas (ex: 1,3,5)</label>
        <input type="text" id="extractPages" placeholder="1,2,3" />
      </div>
    </div>

    <div class="opts hidden" id="opts-pdf-to-img">
      <div class="row-2">
        <div class="field">
          <label>Páginas (vazio = todas)</label>
          <input type="text" id="pdfToImgPages" placeholder="1,2,3" />
        </div>
        <div class="field">
          <label>Escala (qualidade)</label>
          <select id="pdfToImgScale">
            <option value="1">1x (rápido)</option>
            <option value="2" selected>2x (padrão)</option>
            <option value="3">3x (alta)</option>
          </select>
        </div>
      </div>
    </div>

    <button type="submit" id="submitBtn" disabled>Processar</button>
    <div id="result"></div>
  </div>

  <script>
    let files = [];
    let op = "compress";
    let cat = "img";

    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const submitBtn = document.getElementById("submitBtn");
    const result = document.getElementById("result");
    const dropLabel = document.getElementById("dropLabel");

    const PDF_OPS = ["pdf-merge", "pdf-split", "pdf-extract", "img-to-pdf", "pdf-to-img"];
    const MULTI_OPS = ["pdf-merge", "img-to-pdf"]; // aceitam múltiplos arquivos

    // Categoria
    document.querySelectorAll(".cat-tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".cat-tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        cat = tab.dataset.cat;

        document.getElementById("img-ops").classList.toggle("hidden", cat !== "img");
        document.getElementById("pdf-ops").classList.toggle("hidden", cat !== "pdf");

        // Seleciona primeira aba da categoria
        const firstTab = document.querySelector(cat === "img" ? "#img-ops .tab" : "#pdf-ops .tab");
        if (firstTab) firstTab.click();

        resetFiles();
      });
    });

    // Operação
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        const parent = tab.closest(".tabs");
        parent.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        op = tab.dataset.op;

        document.querySelectorAll(".opts").forEach(o => o.classList.add("hidden"));
        const optsEl = document.getElementById(`opts-${op}`);
        if (optsEl) optsEl.classList.remove("hidden");

        // Atualiza drop zone
        const isPdf = PDF_OPS.includes(op);
        const isMulti = MULTI_OPS.includes(op);
        dropZone.classList.toggle("pdf", isPdf);
        fileInput.accept = op === "img-to-pdf" ? "image/*" : isPdf ? "application/pdf" : "image/*";
        fileInput.multiple = isMulti;
        dropLabel.textContent = isPdf ? (isMulti ? "PDFs" : op === "img-to-pdf" ? "Imagens" : "PDF") : "Imagem";
        submitBtn.classList.toggle("pdf-btn", isPdf);

        resetFiles();
        result.style.display = "none";
      });
    });

    // Drop zone
    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("over"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("over"));
    dropZone.addEventListener("drop", e => {
      e.preventDefault();
      dropZone.classList.remove("over");
      setFiles([...e.dataTransfer.files]);
    });
    fileInput.addEventListener("change", () => setFiles([...fileInput.files]));

    function setFiles(f) {
      if (!f.length) return;
      files = f;
      dropZone.textContent = f.length === 1 ? f[0].name : `${f.length} arquivos selecionados`;
      dropZone.classList.add("has-file");
      submitBtn.disabled = false;
    }

    function resetFiles() {
      files = [];
      fileInput.value = "";
      dropZone.textContent = "Arraste ou clique para selecionar";
      dropZone.classList.remove("has-file");
      submitBtn.disabled = true;
    }

    // Submit
    submitBtn.addEventListener("click", async () => {
      if (!files.length) return;
      submitBtn.disabled = true;
      submitBtn.textContent = "Processando...";
      result.style.display = "none";

      const fd = new FormData();
      const isPdf = PDF_OPS.includes(op);

      // Append files
      if (op === "pdf-merge") files.forEach(f => fd.append("pdfs", f));
      else if (op === "img-to-pdf") files.forEach(f => fd.append("images", f));
      else if (isPdf) fd.append("pdf", files[0]);
      else fd.append("image", files[0]);

      // Append options
      if (op === "compress") {
        fd.append("format", document.getElementById("format").value);
        fd.append("quality", document.getElementById("quality").value);
        fd.append("width", document.getElementById("compressWidth").value);
      } else if (op === "resize") {
        fd.append("width", document.getElementById("resizeWidth").value);
        fd.append("height", document.getElementById("resizeHeight").value);
        fd.append("fit", document.getElementById("resizeFit").value);
      } else if (op === "rotate") {
        fd.append("angle", document.getElementById("rotateAngle").value);
        fd.append("auto", document.getElementById("rotateAuto").value);
      } else if (op === "watermark") {
        fd.append("text", document.getElementById("wmText").value);
        fd.append("position", document.getElementById("wmPosition").value);
        fd.append("opacity", document.getElementById("wmOpacity").value);
      } else if (op === "pdf-extract") {
        fd.append("pages", document.getElementById("extractPages").value);
      } else if (op === "pdf-to-img") {
        fd.append("pages", document.getElementById("pdfToImgPages").value);
        fd.append("scale", document.getElementById("pdfToImgScale").value);
      }

      try {
        const res = await fetch(`/${op}`, { method: "POST", body: fd });
        const ct = res.headers.get("Content-Type") ?? "";

        if (!res.ok) {
          const j = await res.json().catch(() => ({ error: "Erro desconhecido" }));
          throw new Error(j.error);
        }

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);

        if (ct.startsWith("image/")) {
          const ext = ct.split("/")[1];
          const name = files[0].name.replace(/\.[^.]+$/, `.${ext}`);
          result.className = "success";
          result.innerHTML = `✓ Pronto — <a href="${url}" download="${name}">Baixar ${name}</a>`;
        } else if (ct === "application/pdf") {
          result.className = "success pdf";
          result.innerHTML = `✓ Pronto — <a href="${url}" download="resultado.pdf">Baixar PDF</a>`;
        } else if (ct === "application/zip") {
          result.className = "success pdf";
          result.innerHTML = `✓ Pronto — <a href="${url}" download="resultado.zip">Baixar ZIP</a>`;
        } else if (ct.includes("json")) {
          const json = JSON.parse(await blob.text());
          if (op === "blur") {
            result.className = "success";
            result.innerHTML = `✓ Blur placeholder gerado<br><pre>${json.blur}</pre>`;
          } else if (op === "report") {
            const { filename, size, width, height, format, estimatedWebp } = json;
            result.className = "success";
            result.innerHTML = `<strong>${filename}</strong><br>
              Tamanho: ${(size/1e3).toFixed(0)}KB | ${width}×${height} | ${format}<br>
              Estimativa WebP: ~${(estimatedWebp/1e3).toFixed(0)}KB (economia ~85%)`;
          }
        }
      } catch (e) {
        result.className = "error";
        result.textContent = `Erro: ${e.message}`;
      }

      result.style.display = "block";
      submitBtn.disabled = false;
      submitBtn.textContent = "Processar";
    });
  </script>
</body>
</html>
